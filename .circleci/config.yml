version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  lint-and-test:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run HTML linter
          command: npm run lint:html
      - run:
          name: Run CSS linter
          command: npm run lint:css
      - run:
          name: Run tests
          command: npm test
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  deploy:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - run:
          name: Install gh-pages CLI
          command: npm install -g gh-pages
      - run:
          name: Configure Git
          command: |
            git config user.email "ci@joelsaju.dev"
            git config user.name "CircleCI Deploy"
      - run:
          name: Deploy to GitHub Pages
          command: gh-pages -d . -m "deploy: $CIRCLE_SHA1"

workflows:
  ci-cd:
    jobs:
      - lint-and-test
      - deploy:
          requires:
            - lint-and-test
          filters:
            branches:
              only: main
